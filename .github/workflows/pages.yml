name: Deploy Kho Truyen Static Export

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Create framework-free static export
        env:
          TOKEN: ${{ secrets.SITES_BYPASS_TOKEN }}
        run: |
          mkdir -p export-source _site
          wget --header="OAI-Sites-Authorization: Bearer $TOKEN" --mirror --page-requisites --convert-links --adjust-extension --no-parent --directory-prefix=export-source https://kho-truyen-api.nerrf.chatgpt.site/
          cp -a export-source/kho-truyen-api.nerrf.chatgpt.site/. _site/
          wget --header="OAI-Sites-Authorization: Bearer $TOKEN" -O _site/github-pages-interactions.js https://kho-truyen-api.nerrf.chatgpt.site/github-pages-interactions.js
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path("_site")
          for path in root.rglob("*"):
              if not path.is_file() or path.suffix not in {".html", ".css", ".js"}:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              text = re.sub(r"([\"'])/(?!abc123997/|/)", r"\1/abc123997/", text)
              text = text.replace("url(/", "url(/abc123997/")
              text = text.replace("/abc123997/abc123997/", "/abc123997/")
              if path.suffix == ".html":
                  text = re.sub(r"<script\b[^>]*>.*?</script>", "", text, flags=re.I | re.S)
                  interaction = '''<script>
          (() => {
            const root = document.querySelector('main');
            const toggle = document.querySelector('[role="switch"][aria-label="Dark mode"]');
            const saved = localStorage.getItem('khotruyen-theme');
            const applyTheme = (theme) => {
              root.dataset.theme = theme;
              toggle.setAttribute('aria-checked', String(theme === 'dark'));
              localStorage.setItem('khotruyen-theme', theme);
            };
            applyTheme(saved === 'light' || saved === 'dark' ? saved : 'dark');
            toggle.addEventListener('click', () => applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark'));

            const menuButton = document.querySelector('button[aria-label="Mở menu"]');
            const sidebar = document.querySelector('aside');
            let menuOpen = false;
            menuButton.addEventListener('click', () => {
              menuOpen = !menuOpen;
              sidebar.style.transform = menuOpen ? 'translateX(0)' : '';
              menuButton.setAttribute('aria-expanded', String(menuOpen));
            });
            sidebar.querySelectorAll('a').forEach(link => link.addEventListener('click', () => {
              menuOpen = false;
              sidebar.style.transform = '';
              menuButton.setAttribute('aria-expanded', 'false');
            }));
          })();
          </script><script src="/abc123997/github-pages-interactions.js"></script>'''
                  text = text.replace("</body>", interaction + "</body>")
              path.write_text(text, encoding="utf-8")
          PY
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy static export to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
