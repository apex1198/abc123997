name: Deploy Kho Truyen to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Mirror production website
        env:
          TOKEN: ${{ secrets.SITES_BYPASS_TOKEN }}
        run: |
          mkdir -p mirror _site
          wget --header="OAI-Sites-Authorization: Bearer $TOKEN" --mirror --page-requisites --convert-links --adjust-extension --no-parent --directory-prefix=mirror https://kho-truyen-api.nerrf.chatgpt.site/
          cp -a mirror/kho-truyen-api.nerrf.chatgpt.site/. _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
